services:
  - type: web
    name: booklytics-backend
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        value: "https://booklytics-ten.vercel.app"
      - key: PYTHON_VERSION
        value: "3.10.0"
